<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart — Urban Threads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
      :root {
        --black: #0a0a0a;
        --white: #f5f0eb;
        --cream: #ede8e1;
        --orange: #e8500a;
        --orange2: #ff6b2b;
        --grey: #1c1c1c;
        --grey2: #252525;
        --border: rgba(255, 255, 255, 0.08);
        --font-display: "Bebas Neue", sans-serif;
        --font-body: "DM Sans", sans-serif;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--black);
        color: var(--white);
        font-family: var(--font-body);
        min-height: 100vh;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        font-family: var(--font-body);
        cursor: pointer;
      }

      /* NAV */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        height: 64px;
        background: rgba(10, 10, 10, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }
      .nav-logo {
        font-family: var(--font-display);
        font-size: 1.8rem;
        letter-spacing: 0.05em;
      }
      .nav-logo span {
        color: var(--orange);
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
      }
      .nav-links a {
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(245, 240, 235, 0.65);
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--white);
      }
      .nav-cta {
        background: var(--orange);
        color: var(--white) !important;
        padding: 8px 20px;
        border-radius: 2px;
        font-weight: 500 !important;
        transition: background 0.2s !important;
      }
      .nav-cta:hover {
        background: var(--orange2) !important;
      }
      #nav-user-info {
        font-size: 0.78rem;
        color: var(--orange);
        letter-spacing: 0.05em;
      }
      #nav-logout-btn {
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(245, 240, 235, 0.6);
        padding: 6px 14px;
        border-radius: 2px;
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: all 0.2s;
      }
      #nav-logout-btn:hover {
        border-color: var(--orange);
        color: var(--orange);
      }

      /* PAGE HEADER */
      .page-header {
        padding: 100px 80px 40px;
        border-bottom: 1px solid var(--border);
      }
      .page-title {
        font-family: var(--font-display);
        font-size: clamp(3rem, 7vw, 5.5rem);
        letter-spacing: 0.02em;
        line-height: 1;
      }
      .page-title span {
        color: var(--orange);
      }
      .page-sub {
        margin-top: 8px;
        font-size: 0.88rem;
        color: rgba(245, 240, 235, 0.4);
        letter-spacing: 0.05em;
      }

      /* LAYOUT */
      .cart-layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 0;
        min-height: calc(100vh - 200px);
      }
      .cart-main {
        padding: 40px 60px 80px 80px;
        border-right: 1px solid var(--border);
      }
      .cart-sidebar {
        padding: 40px 40px 80px;
        position: sticky;
        top: 64px;
        height: calc(100vh - 64px);
        overflow-y: auto;
      }

      /* CART ITEMS */
      .cart-items {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .cart-item {
        display: grid;
        grid-template-columns: 90px 1fr auto;
        gap: 20px;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid var(--border);
        animation: fadeSlideIn 0.3s var(--ease) both;
      }
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .cart-item-img {
        width: 90px;
        height: 90px;
        border-radius: 3px;
        object-fit: cover;
        background: var(--grey);
      }
      .cart-item-name {
        font-family: var(--font-display);
        font-size: 1.3rem;
        letter-spacing: 0.03em;
        margin-bottom: 4px;
        line-height: 1.1;
      }
      .cart-item-price {
        font-size: 0.88rem;
        color: var(--orange);
        font-weight: 500;
        margin-bottom: 12px;
      }
      .qty-control {
        display: flex;
        align-items: center;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: 3px;
        overflow: hidden;
        width: fit-content;
      }
      .qty-btn {
        background: var(--grey);
        border: none;
        color: var(--white);
        width: 32px;
        height: 32px;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .qty-btn:hover {
        background: #333;
      }
      .qty-display {
        width: 44px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-size: 1rem;
        background: var(--grey2);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
      .cart-item-total {
        font-family: var(--font-display);
        font-size: 1.4rem;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .remove-btn {
        background: none;
        border: none;
        color: rgba(245, 240, 235, 0.2);
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 4px 0;
        margin-top: 6px;
        transition: color 0.2s;
      }
      .remove-btn:hover {
        color: #ff5555;
      }

      /* SIDEBAR — SUMMARY */
      .summary-title {
        font-family: var(--font-display);
        font-size: 1.8rem;
        letter-spacing: 0.04em;
        margin-bottom: 28px;
      }
      .summary-title span {
        color: var(--orange);
      }
      .summary-lines {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }
      .summary-line {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .summary-label {
        font-size: 0.82rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(245, 240, 235, 0.45);
      }
      .summary-value {
        font-size: 0.92rem;
        font-weight: 500;
      }
      .summary-divider {
        height: 1px;
        background: var(--border);
        margin: 8px 0;
      }
      .summary-total-line {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .summary-total-label {
        font-family: var(--font-display);
        font-size: 1.3rem;
        letter-spacing: 0.06em;
      }
      .summary-total-value {
        font-family: var(--font-display);
        font-size: 2rem;
        color: var(--orange);
        letter-spacing: 0.03em;
      }

      /* PROMO CODE */
      .promo-wrap {
        margin: 24px 0;
        display: flex;
        gap: 8px;
      }
      .promo-input {
        flex: 1;
        background: var(--grey);
        border: 1px solid var(--border);
        color: var(--white);
        padding: 12px 14px;
        border-radius: 3px;
        font-family: var(--font-body);
        font-size: 0.88rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .promo-input:focus {
        border-color: var(--orange);
      }
      .promo-input::placeholder {
        color: rgba(245, 240, 235, 0.2);
      }
      .promo-apply {
        background: var(--grey);
        border: 1px solid var(--border);
        color: rgba(245, 240, 235, 0.6);
        padding: 12px 16px;
        border-radius: 3px;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: all 0.2s;
      }
      .promo-apply:hover {
        border-color: var(--orange);
        color: var(--orange);
      }

      /* CHECKOUT BTN */
      .checkout-btn {
        display: block;
        width: 100%;
        background: var(--orange);
        color: var(--white);
        border: none;
        padding: 18px;
        font-family: var(--font-display);
        font-size: 1.2rem;
        letter-spacing: 0.12em;
        border-radius: 3px;
        transition:
          background 0.2s,
          transform 0.15s;
        text-align: center;
        margin-top: 16px;
      }
      .checkout-btn:hover {
        background: var(--orange2);
        transform: translateY(-1px);
      }
      .checkout-btn:active {
        transform: none;
      }
      .checkout-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .continue-btn {
        display: block;
        width: 100%;
        background: transparent;
        color: rgba(245, 240, 235, 0.5);
        border: 1px solid var(--border);
        padding: 14px;
        font-family: var(--font-display);
        font-size: 1rem;
        letter-spacing: 0.1em;
        border-radius: 3px;
        transition: all 0.2s;
        text-align: center;
        margin-top: 8px;
      }
      .continue-btn:hover {
        border-color: rgba(245, 240, 235, 0.3);
        color: var(--white);
      }

      /* SECURE NOTE */
      .secure-note {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 16px;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        color: rgba(245, 240, 235, 0.25);
        text-transform: uppercase;
      }

      /* EMPTY STATE */
      .empty-cart {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        gap: 20px;
        text-align: center;
        grid-column: 1/-1;
      }
      .empty-icon {
        font-size: 4rem;
        opacity: 0.3;
      }
      .empty-title {
        font-family: var(--font-display);
        font-size: 2.5rem;
        letter-spacing: 0.04em;
        color: rgba(245, 240, 235, 0.4);
      }
      .empty-sub {
        font-size: 0.88rem;
        color: rgba(245, 240, 235, 0.25);
      }
      .shop-now-btn {
        background: var(--orange);
        color: var(--white);
        border: none;
        padding: 14px 36px;
        font-family: var(--font-display);
        font-size: 1.1rem;
        letter-spacing: 0.1em;
        border-radius: 2px;
        transition: background 0.2s;
        display: inline-block;
        margin-top: 8px;
      }
      .shop-now-btn:hover {
        background: var(--orange2);
      }

      /* LOGIN GATE */
      .login-gate {
        padding: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 60vh;
        gap: 20px;
        grid-column: 1/-1;
      }
      .login-gate-title {
        font-family: var(--font-display);
        font-size: 3rem;
        letter-spacing: 0.03em;
      }
      .login-gate-title span {
        color: var(--orange);
      }
      .login-gate-sub {
        font-size: 0.92rem;
        color: rgba(245, 240, 235, 0.45);
        max-width: 380px;
        line-height: 1.6;
      }
      .login-gate-btn {
        background: var(--orange);
        color: var(--white);
        border: none;
        padding: 16px 40px;
        font-family: var(--font-display);
        font-size: 1.15rem;
        letter-spacing: 0.1em;
        border-radius: 3px;
        transition: background 0.2s;
        display: inline-block;
        margin-top: 8px;
      }
      .login-gate-btn:hover {
        background: var(--orange2);
      }

      /* ORDER CONFIRMATION */
      .order-confirm {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 10, 0.95);
        z-index: 200;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 24px;
        text-align: center;
        padding: 40px;
      }
      .order-confirm.show {
        display: flex;
      }
      .confirm-icon {
        font-size: 4rem;
        animation: bounce 0.5s var(--ease);
      }
      @keyframes bounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }
      .confirm-title {
        font-family: var(--font-display);
        font-size: clamp(2.5rem, 6vw, 5rem);
        letter-spacing: 0.02em;
      }
      .confirm-title span {
        color: var(--orange);
      }
      .confirm-sub {
        font-size: 0.9rem;
        color: rgba(245, 240, 235, 0.5);
        max-width: 400px;
        line-height: 1.6;
      }
      .confirm-btn {
        background: var(--orange);
        color: var(--white);
        border: none;
        padding: 16px 40px;
        font-family: var(--font-display);
        font-size: 1.1rem;
        letter-spacing: 0.12em;
        border-radius: 3px;
        transition: background 0.2s;
        margin-top: 8px;
      }
      .confirm-btn:hover {
        background: var(--orange2);
      }

      /* RESPONSIVE */
      @media (max-width: 1100px) {
        .cart-layout {
          grid-template-columns: 1fr;
        }
        .cart-sidebar {
          position: static;
          height: auto;
          border-top: 1px solid var(--border);
        }
        .cart-main {
          border-right: none;
        }
      }
      @media (max-width: 768px) {
        nav {
          padding: 0 20px;
        }
        .page-header,
        .cart-main {
          padding-left: 24px;
          padding-right: 24px;
        }
        .page-header {
          padding-top: 90px;
        }
        .cart-sidebar {
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <a href="index.html" class="nav-logo">URBAN<span>.</span>THREADS</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html" class="active">Cart</a>
        <span id="nav-user-info"></span>
        <button id="nav-logout-btn" style="display: none">Logout</button>
        <a href="login.html" id="nav-login-link" class="nav-cta">Sign In</a>
      </div>
    </nav>

    <!-- HEADER -->
    <div class="page-header">
      <h1 class="page-title">YOUR <span>BAG</span></h1>
      <p class="page-sub" id="cart-item-count">Loading…</p>
    </div>

    <!-- BODY -->
    <div id="cart-body">
      <!-- Injected by JS -->
    </div>

    <!-- ORDER CONFIRMATION OVERLAY -->
    <div class="order-confirm" id="order-confirm">
      <div class="confirm-icon">🎉</div>
      <h2 class="confirm-title">ORDER <span>PLACED!</span></h2>
      <p class="confirm-sub">
        Thanks for shopping with Urban Threads. Your order is being processed.
        You'll receive a confirmation shortly.
      </p>
      <button class="confirm-btn" onclick="closeConfirm()">
        CONTINUE SHOPPING
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
