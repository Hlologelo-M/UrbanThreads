<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Urban Threads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
      :root {
        --black: #0a0a0a;
        --white: #f5f0eb;
        --cream: #ede8e1;
        --orange: #e8500a;
        --orange2: #ff6b2b;
        --grey: #1c1c1c;
        --border: rgba(255, 255, 255, 0.08);
        --font-display: "Bebas Neue", sans-serif;
        --font-body: "DM Sans", sans-serif;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--black);
        color: var(--white);
        font-family: var(--font-body);
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
        overflow: hidden;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* LEFT PANEL */
      .left-panel {
        position: relative;
        overflow: hidden;
        background: var(--grey);
      }
      .left-bg {
        position: absolute;
        inset: 0;
        background: url("https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900&q=80")
          center/cover;
        opacity: 0.35;
      }
      .left-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(232, 80, 10, 0.25) 0%,
          rgba(10, 10, 10, 0.9) 100%
        );
      }
      .left-content {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 48px;
      }
      .left-logo {
        font-family: var(--font-display);
        font-size: 2rem;
        letter-spacing: 0.05em;
      }
      .left-logo span {
        color: var(--orange);
      }
      .left-tagline {
        font-family: var(--font-display);
        font-size: clamp(3rem, 5vw, 5rem);
        letter-spacing: 0.02em;
        line-height: 0.95;
        color: var(--white);
      }
      .left-tagline .accent {
        color: var(--orange);
      }
      .left-quote {
        font-size: 0.85rem;
        color: rgba(245, 240, 235, 0.45);
        line-height: 1.6;
        max-width: 320px;
      }

      /* RIGHT PANEL */
      .right-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      .auth-box {
        width: 100%;
        max-width: 420px;
      }
      .auth-greeting {
        font-family: var(--font-display);
        font-size: clamp(2.5rem, 4vw, 3.5rem);
        letter-spacing: 0.03em;
        margin-bottom: 6px;
      }
      .auth-greeting span {
        color: var(--orange);
      }
      .auth-sub {
        font-size: 0.88rem;
        color: rgba(245, 240, 235, 0.45);
        margin-bottom: 40px;
        line-height: 1.5;
      }

      /* TABS */
      .auth-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 36px;
      }
      .auth-tab {
        flex: 1;
        background: none;
        border: none;
        color: rgba(245, 240, 235, 0.4);
        font-family: var(--font-display);
        font-size: 1.1rem;
        letter-spacing: 0.1em;
        padding: 12px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .auth-tab.active {
        color: var(--orange);
        border-bottom-color: var(--orange);
      }

      /* FORM */
      .auth-form {
        display: none;
        flex-direction: column;
        gap: 16px;
      }
      .auth-form.active {
        display: flex;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-label {
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(245, 240, 235, 0.45);
      }
      .form-input {
        background: var(--grey);
        border: 1px solid var(--border);
        color: var(--white);
        padding: 14px 16px;
        border-radius: 3px;
        font-family: var(--font-body);
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-input:focus {
        border-color: var(--orange);
      }
      .form-input::placeholder {
        color: rgba(245, 240, 235, 0.2);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* DIVIDER */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 4px 0;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .divider-text {
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        color: rgba(245, 240, 235, 0.25);
      }

      /* BUTTONS */
      .btn-submit {
        background: var(--orange);
        color: var(--white);
        border: none;
        padding: 16px;
        width: 100%;
        font-family: var(--font-display);
        font-size: 1.15rem;
        letter-spacing: 0.12em;
        cursor: pointer;
        border-radius: 3px;
        transition:
          background 0.2s,
          transform 0.15s;
        margin-top: 4px;
      }
      .btn-submit:hover {
        background: var(--orange2);
        transform: translateY(-1px);
      }
      .btn-submit:active {
        transform: none;
      }
      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-google {
        background: var(--grey);
        color: var(--white);
        border: 1px solid var(--border);
        padding: 14px;
        width: 100%;
        font-family: var(--font-body);
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .btn-google:hover {
        border-color: rgba(255, 255, 255, 0.25);
        background: #252525;
      }
      .google-icon {
        width: 18px;
        height: 18px;
      }

      /* MESSAGES */
      .auth-message {
        padding: 12px 16px;
        border-radius: 3px;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
        display: none;
      }
      .auth-message.error {
        background: rgba(220, 60, 60, 0.12);
        border: 1px solid rgba(220, 60, 60, 0.3);
        color: #ff8080;
        display: block;
      }
      .auth-message.success {
        background: rgba(42, 157, 92, 0.12);
        border: 1px solid rgba(42, 157, 92, 0.3);
        color: #5de8a0;
        display: block;
      }

      /* PASSWORD TOGGLE */
      .input-wrap {
        position: relative;
      }
      .input-wrap .form-input {
        padding-right: 42px;
      }
      .toggle-pw {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: rgba(245, 240, 235, 0.3);
        cursor: pointer;
        font-size: 0.85rem;
        transition: color 0.2s;
        padding: 4px;
      }
      .toggle-pw:hover {
        color: rgba(245, 240, 235, 0.7);
      }

      /* FOOTER */
      .auth-footer {
        text-align: center;
        margin-top: 28px;
        font-size: 0.8rem;
        color: rgba(245, 240, 235, 0.3);
      }
      .auth-footer a {
        color: var(--orange);
      }

      /* RESPONSIVE */
      @media (max-width: 900px) {
        body {
          grid-template-columns: 1fr;
        }
        .left-panel {
          display: none;
        }
        .right-panel {
          padding: 80px 24px 40px;
        }
      }
    </style>
  </head>
  <body>
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="left-bg"></div>
      <div class="left-overlay"></div>
      <div class="left-content">
        <a href="index.html" class="left-logo">URBAN<span>.</span>THREADS</a>
        <div>
          <h2 class="left-tagline">
            YOUR<br />STYLE,<br /><span class="accent">YOUR</span><br />RULES.
          </h2>
        </div>
        <p class="left-quote">
          Join thousands who wear the street. Members get early access to drops,
          exclusive discounts, and fast checkout.
        </p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="auth-box">
        <h1 class="auth-greeting">WELCOME <span>BACK</span></h1>
        <p class="auth-sub">Sign in to access your cart and orders.</p>

        <div class="auth-tabs">
          <button
            class="auth-tab active"
            id="tab-login"
            onclick="switchTab('login')"
          >
            SIGN IN
          </button>
          <button
            class="auth-tab"
            id="tab-signup"
            onclick="switchTab('signup')"
          >
            CREATE ACCOUNT
          </button>
        </div>

        <!-- ── LOGIN FORM ── -->
        <form
          class="auth-form active"
          id="form-login"
          onsubmit="handleLogin(event)"
        >
          <div class="auth-message" id="login-msg"></div>

          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              class="form-input"
              id="login-email"
              placeholder="your@email.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
              <input
                type="password"
                class="form-input"
                id="login-password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="toggle-pw"
                onclick="togglePw('login-password', this)"
              >
                👁
              </button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="login-btn">
            SIGN IN
          </button>

          <div class="divider">
            <span class="divider-text">OR CONTINUE WITH</span>
          </div>
          <button type="button" class="btn-google" onclick="handleGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path
                fill="#EA4335"
                d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115Z"
              />
              <path
                fill="#34A853"
                d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.777l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z"
              />
              <path
                fill="#4A90E2"
                d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.17 2.766-2.395 3.558L19.834 21Z"
              />
              <path
                fill="#FBBC05"
                d="M5.277 14.314c-.221-.666-.345-1.373-.345-2.314s.124-1.648.345-2.314L1.24 6.65C.448 8.237 0 10.013 0 12c0 1.986.448 3.762 1.24 5.35l4.037-3.036Z"
              />
            </svg>
            Continue with Google
          </button>
        </form>

        <!-- ── SIGNUP FORM ── -->
        <form class="auth-form" id="form-signup" onsubmit="handleSignup(event)">
          <div class="auth-message" id="signup-msg"></div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input
                type="text"
                class="form-input"
                id="signup-fname"
                placeholder="Alex"
                autocomplete="given-name"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input
                type="text"
                class="form-input"
                id="signup-lname"
                placeholder="Doe"
                autocomplete="family-name"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              class="form-input"
              id="signup-email"
              placeholder="your@email.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Password
              <span style="color: rgba(245, 240, 235, 0.3); font-size: 0.7rem"
                >(min 6 characters)</span
              ></label
            >
            <div class="input-wrap">
              <input
                type="password"
                class="form-input"
                id="signup-password"
                placeholder="••••••••"
                autocomplete="new-password"
                required
                minlength="6"
              />
              <button
                type="button"
                class="toggle-pw"
                onclick="togglePw('signup-password', this)"
              >
                👁
              </button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="signup-btn">
            CREATE ACCOUNT
          </button>

          <div class="divider">
            <span class="divider-text">OR CONTINUE WITH</span>
          </div>
          <button type="button" class="btn-google" onclick="handleGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path
                fill="#EA4335"
                d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115Z"
              />
              <path
                fill="#34A853"
                d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.777l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z"
              />
              <path
                fill="#4A90E2"
                d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.17 2.766-2.395 3.558L19.834 21Z"
              />
              <path
                fill="#FBBC05"
                d="M5.277 14.314c-.221-.666-.345-1.373-.345-2.314s.124-1.648.345-2.314L1.24 6.65C.448 8.237 0 10.013 0 12c0 1.986.448 3.762 1.24 5.35l4.037-3.036Z"
              />
            </svg>
            Continue with Google
          </button>
        </form>

        <p class="auth-footer">
          By continuing you agree to our <a href="#">Terms of Service</a>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
